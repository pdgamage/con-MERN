services:
  mongo:
    image: mongo
    container_name: mongo_container
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  server:
    build: ./server
    container_name: server_container
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      - MONGODB_URI=mongodb://mongo:27017/dockertest

  client:
    build: ./client/vite-project
    container_name: client_container
    ports:
      - "5173:5173"
    depends_on:
      - server
    volumes:
      - ./client/vite-project:/app
      - /app/node_modules
    stdin_open: true
    tty: true

volumes:
  mongo_data:
